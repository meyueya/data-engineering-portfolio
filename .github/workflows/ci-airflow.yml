name: CI Airflow DAG tests

on:
  push:
    branches: [ 'master', 'main' ]
  workflow_dispatch: {}

jobs:
  airflow-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Compose (uses docker on runner)
      run: |
        docker compose version

    - name: Start Airflow with docker-compose
      run: |
        docker compose up -d --build

    - name: Wait for Airflow DB
      run: |
        for i in {1..60}; do
          docker compose exec airflow airflow db check && break || sleep 2
        done

    - name: Load data into SQLite
      run: |
        docker compose exec airflow python /opt/airflow/scripts/load_data.py

    - name: Run DBT (seed, run, test)
      run: |
        docker compose exec airflow bash /opt/airflow/scripts/run_dbt.sh || true

    - name: Test DAG: etl_load_and_dbt
      run: |
        docker compose exec airflow airflow dags test etl_load_and_dbt 2026-06-01

    - name: Test DAG: data_quality_checks
      run: |
        docker compose exec airflow airflow dags test data_quality_checks 2026-06-01

    - name: Tear down
      if: always()
      run: |
        docker compose down
